<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ============================================================= -->
    <!-- PRIMARY SEO META TAGS                                          -->
    <!-- ============================================================= -->
    <title>Yasim & Fiza — Engagement Invitation</title>
    <meta
      name="description"
      content="You are warmly invited to the Engagement Ceremony of Yasim Jamadar and Fiza Shaikh. Your presence and duas will make this occasion truly special."
    />
    <meta name="author" content="The Jamadar Family" />
    <meta name="theme-color" content="#F8EEDC" />

    <!-- Private invitation: keep it out of search engines so the contact
         number and event details aren't publicly indexed. -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Favicon (lightweight SVG) -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./favicon.svg" />

    <!-- ============================================================= -->
    <!-- OPEN GRAPH / WHATSAPP PREVIEW                                  -->
    <!-- og:image and og:url MUST be ABSOLUTE URLs — WhatsApp and other  -->
    <!-- crawlers do not resolve relative paths. If the deployed domain  -->
    <!-- changes, update every absolute URL in this block.               -->
    <!--                                                                 -->
    <!-- og-preview.jpg is the couple portrait composed onto a 1200x630  -->
    <!-- card (regenerate with scripts/make-og.ps1). JPEG, not PNG:      -->
    <!-- WhatsApp skips previews over a few hundred KB and the photo     -->
    <!-- does not fit that budget as PNG. WhatsApp never renders SVG.    -->
    <!-- ============================================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Yasim & Fiza Engagement" />
    <meta property="og:title" content="Yasim & Fiza — Engagement Invitation" />
    <meta
      property="og:description"
      content="You are warmly invited to the Engagement Ceremony of Yasim Jamadar and Fiza Shaikh. Your presence and duas will make this occasion truly special."
    />
    <meta property="og:url" content="https://engagement-invitation-5txt.vercel.app/" />
    <meta property="og:image" content="https://res.cloudinary.com/gtwtrgvq/image/upload/v1784446778/YJ_b6hu6h.png" />
    <meta property="og:image:secure_url" content="https://res.cloudinary.com/gtwtrgvq/image/upload/v1784446778/YJ_b6hu6h.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Yasim & Fiza Engagement Ceremony — Friday, 24 July 2026" />
    <meta property="og:locale" content="en_IN" />

    <!-- ============================================================= -->
    <!-- TWITTER CARD                                                   -->
    <!-- ============================================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yasim & Fiza — Engagement Invitation" />
    <meta
      name="twitter:description"
      content="You are warmly invited to the Engagement Ceremony of Yasim Jamadar and Fiza Shaikh. Your presence and duas will make this occasion truly special."
    />
    <meta name="twitter:image" content="https://engagement-invitation-5txt.vercel.app/og-preview.jpg" />
    <meta name="twitter:image:alt" content="Yasim & Fiza Engagement Ceremony — Friday, 24 July 2026" />

    <!-- ============================================================= -->
    <!-- FONTS                                                          -->
    <!-- ============================================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
